name:CI
on:
  push:
    branches:[ main ]
jobs:
  test:
    runs-on:ubuntu-latest
    steps:
      - uses:actions/checkout@v4
      - uses:actions/setup-node@v4
        with:
          node-version:'18'
      - run:cd mock-server && npm install
      - run:cd mock-server && node server.js &
      - run:sleep 5
      - uses:actions/setup-python@v5
        with:
          python-version:'3.11'
      - run:pip install requests pytest pytest-html
      - run:pytest test_user_api.py -v
