name: API Automation Test  

on:
    push:     
        branches: [ main ]  
jobs:   
    test:       
        runs-on: ubuntu-latest      
        steps:       
            - uses: actions/checkout@v4        
            - name: Setup Node.js         
              uses: actions/setup-node@v4         
              with:           
                  node-version: '18'              
            - name: Install Mock Server Dependencies         
              run: |           
                  cd mock-server           
                  npm install            
            - name: Start Mock Server         
                         run: |           
                             cd mock-server
                             pwd
                             ls -la
                             node server.js > server.log 2>&1 &                    
                             sleep 2
                             pgrep -f "node server.js" || (cat server.log && exit 1)
                             for i in {1..10};do 
                                 nc -zv localhost 3000 &break
                                 echo "Waiting for port 3000... $i" 
                                 sleep 1
                             done  
                             nc -zv localhost 3000 || (echo "mock Server failed to start" && cat server.log && exit 1)    
            - name: Setup Python         
              uses: actions/setup-python@v5         
              with:           
                  python-version: '3.11'              
            - name: Install Python Dependencies         
              run: |           
                  pip install requests pytest             
            - name: Run Tests         
              run: |           
                  pytest test_user_api.py -v